"""
AEM MDM - API Mesh Common Schema

This schema is MASTER-AGNOSTIC. The same schema serves all master data files.
No changes required when a new CSV/master is uploaded.

The `data` field returns opaque JSON objects (JSON scalar) whose shape depends
on the master's schema. Consumers query `data` without specifying sub-fields.
Use the `fields` argument to select specific columns if needed.

Filters are passed as query params that map to the master's queryable columns.

Usage examples:
  # Query all records — data comes back as raw JSON
  { mdmQuery(master: "exportdata", page: 1, pageSize: 25) { master count total data } }

  # Filter by specific field
  { mdmQuery(master: "product", filters: "brand=Nike") { master total data } }

  # Single record lookup (IDs are always strings, even for auto-increment integer IDs)
  { mdmRecord(master: "product", id: "1") { master data } }
"""

scalar JSON

"""
A single aggregation bucket value with count
"""
type FacetValue {
  "The distinct value for this bucket"
  value: String!
  "Number of records matching this value"
  count: Int!
  "Whether this value is currently selected as a filter"
  selected: Boolean!
}

"""
Aggregation/facet result for a single field
"""
type Aggregation {
  "Field name this aggregation is computed on"
  field: String!
  "Human-readable label for display"
  label: String!
  "Facet type: value, range, boolean"
  type: String!
  "Whether to show counts next to values"
  showCount: Boolean!
  "Whether this facet should render collapsed by default"
  collapsed: Boolean!
  "Aggregated bucket values with counts"
  values: [FacetValue!]!
}

"""
Facet configuration metadata for a single field
"""
type FacetConfig {
  "Field name"
  field: String!
  "Display label"
  label: String!
  "Facet type: value, range, boolean"
  type: String!
  "Sort buckets by: count or value"
  sortBy: String!
  "Sort direction: asc or desc"
  sortOrder: String!
  "Maximum number of values to return"
  limit: Int!
  "Show counts alongside values"
  showCount: Boolean!
  "Render collapsed by default"
  collapsed: Boolean!
  "Schema field type (string, number, boolean)"
  fieldType: String!
  "Live aggregated values (only when values=true)"
  values: [FacetValue!]
  "Total distinct values for this field"
  totalValues: Int
}

"""
Facets metadata response for a master
"""
type MDMFacetsResponse {
  "Master name"
  master: String!
  "Whether facets are enabled for this master"
  facetsEnabled: Boolean!
  "Total schema fields"
  totalFields: Int
  "Number of facetable fields"
  facetableFields: Int
  "Global facets configuration"
  config: JSON
  "Facet definitions and optionally live values"
  facets: [FacetConfig!]!
  "Total records matching current filters (when values=true)"
  totalRecords: Int
}

"""
Paginated response for master data queries.
This is the COMMON response type for all entities.
"""
type MDMQueryResponse {
  "Master name (e.g., product, stores, categories)"
  master: String!
  "Number of records in this page"
  count: Int!
  "Current page number (1-based)"
  page: Int!
  "Page size"
  pageSize: Int!
  "Total records matching the query"
  total: Int!
  "Array of data records (shape depends on master schema)"
  data: [JSON!]!
  "Aggregations/facets computed for facetable fields (if configured)"
  aggregations: [Aggregation!]
}

"""
Single record response
"""
type MDMRecordResponse {
  "Master name"
  master: String!
  "Record data (shape depends on master schema)"
  data: JSON!
}

"""
Mutation response for create/update/patch/delete operations.
Requires x-partner-id and x-partner-key headers for authentication.
Only available for public entities with CRUD enabled.
"""
type MDMMutationResponse {
  "Whether the operation succeeded"
  success: Boolean!
  "Master name"
  master: String
  "Operation performed: create, update, patch, delete"
  operation: String
  "The created/updated record data (not returned for delete)"
  record: JSON
  "Deleted record ID (only for delete)"
  id: String
  "Error message if operation failed"
  error: String
}

"""
Error response
"""
type MDMErrorResponse {
  error: String!
}

type Query {
  """
  Query master data records with optional filters, pagination, and sorting.
  
  Filters are passed as a JSON string of key-value pairs matching the master's 
  queryable column names. Multiple filters combine with AND logic.
  
  When facets are configured on the master, aggregations are returned automatically.
  Aggregation counts update dynamically based on applied filters (excluding the
  facet's own field — "disjunctive faceting").
  
  Examples:
    mdmQuery(master: "product", page: 1, pageSize: 25)
    mdmQuery(master: "product", filters: "brand=Nike,status=active")
    mdmQuery(master: "product", facets: "true", filters: "brand=Nike")

  Filter formats (both supported):
    Comma-separated key=value (recommended): "brand=Nike,status=active"
    JSON string (must be URL-encoded if via API Mesh): "%7B%22brand%22%3A%22Nike%22%7D"
  """
  mdmQuery(
    "Master name to query (required)"
    master: String!
    "Page number (default: 1)"
    page: Int
    "Records per page (default: 25, max: 100)"
    pageSize: Int
    "Sort by field name (default: primary key)"
    sort: String
    "Sort order: asc or desc (default: asc)"
    order: String
    "Comma-separated field names to include in response"
    fields: String
    "Force include facets/aggregations: true or false (default: auto based on master config)"
    facets: String
    "Filters as comma-separated key=value pairs e.g. brand=Nike,status=active (or URL-encoded JSON)"
    filters: String
  ): MDMQueryResponse!

  """
  Get a single record by master name and primary key value.
  IDs are always passed as strings, even for auto-increment integer IDs.
  
  Example:
    mdmRecord(master: "product", id: "1")
  """
  mdmRecord(
    "Master name (required)"
    master: String!
    "Primary key value as a string (required)"
    id: String!
  ): MDMRecordResponse!

  """
  Get facets/aggregation metadata for a master.
  Returns which fields are facetable and their configuration.
  Optionally returns live aggregated values with counts.
  
  Use this to build faceted navigation / filter UIs on the frontend.
  
  Examples:
    mdmFacets(master: "product") — config only
    mdmFacets(master: "product", values: "true") — config + live counts
    mdmFacets(master: "product", values: "true", filters: "brand=Nike") — counts with filter
  """
  mdmFacets(
    "Master name (required)"
    master: String!
    "Return live aggregated values with counts (default: false)"
    values: String
    "Filters as JSON string to narrow aggregation scope"
    filters: String
  ): MDMFacetsResponse!
}

"""
Mutations for CRUD operations on master data records.
All mutations require `x-partner-id` and `x-partner-key` headers for authentication.
Only available for entities with visibility=public and crudEnabled=true.

All mutations are sent as POST to the backend (never PUT/PATCH/DELETE) to ensure
reliable body delivery through OpenWhisk web actions.

Primary keys are auto-generated as sequential integers if not provided in the data.
System audit fields (`_createdAt`, `_updatedAt`, `_createdBy`, `_updatedBy`) are auto-managed
and NEVER included in API Mesh responses. They are only visible in the Admin UI and CSV exports.

Partners are onboarded via the Integration Token Console in the Admin UI.
Each partner receives a unique partnerId and partnerKey for API access.

Note: The actual GraphQL schema is auto-generated by API Mesh from the JsonSchema
handler config (mesh.json). The `data` field is passed inside `input: { data: "..." }`.
"""
type Mutation {
  """
  Create a new record. The primary key is auto-generated as a sequential integer
  if not provided in the data. System audit fields are injected automatically.
  Validates against the master schema if one is defined.
  
  Example (auto-generated ID):
    mutation { mdmCreate(master: "product", input: { data: "{\"name\":\"Test\",\"category\":\"Demo\"}" }) { success master record } }
  
  Example (explicit ID):
    mutation { mdmCreate(master: "product", input: { data: "{\"sku\":\"NEW1\",\"name\":\"Test\"}" }) { success master record } }
  """
  mdmCreate(
    "Master name (required)"
    master: String!
    "Record data as JSON string wrapped in input object (primary key is auto-generated if omitted)"
    input: MutationInput!
  ): MDMMutationResponse!

  """
  Full update (replace) of an existing record by primary key.
  All fields in data replace the existing record. Primary key is immutable.
  Timestamps (updatedAt) are set automatically by the database.
  
  Example:
    mutation { mdmUpdate(master: "product", id: "1", input: { data: "{\"sku\":\"SKU123\",\"name\":\"Updated\"}" }) { success record } }
  """
  mdmUpdate(
    "Master name (required)"
    master: String!
    "Primary key value of the record to update (required)"
    id: String!
    "Full replacement data as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMMutationResponse!

  """
  Partial update (patch) of an existing record.
  Only the provided fields are merged into the existing record.
  Timestamps (updatedAt) are set automatically by the database.
  
  Example:
    mutation { mdmPatch(master: "product", id: "1", input: { data: "{\"name\":\"Patched Name\"}" }) { success record } }
  """
  mdmPatch(
    "Master name (required)"
    master: String!
    "Primary key value of the record to patch (required)"
    id: String!
    "Partial data as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMMutationResponse!

  """
  Delete a record by primary key (soft delete).
  Timestamps (updatedAt, deletedAt) are set automatically by the database.
  
  Example:
    mutation { mdmDelete(master: "product", id: "1") { success id } }
  """
  mdmDelete(
    "Master name (required)"
    master: String!
    "Primary key value of the record to delete (required)"
    id: String!
  ): MDMMutationResponse!

  """
  Bulk create multiple records in a single request.
  Data is a JSON string containing an array of record objects.
  Primary keys are auto-generated if not provided.
  
  Example:
    mutation { mdmBulkCreate(master: "product", input: { data: "[{\"name\":\"A\"},{\"name\":\"B\"}]" }) { master operation total succeeded failed results { success id error } } }
  """
  mdmBulkCreate(
    "Master name (required)"
    master: String!
    "Array of record objects as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMBulkResponse!

  """
  Bulk update (full replace) multiple records.
  Data is a JSON string containing an array of {id, data} objects.
  
  Example:
    mutation { mdmBulkUpdate(master: "product", input: { data: "[{\"id\":\"1\",\"data\":{\"name\":\"Updated\"}}]" }) { master total succeeded failed results { success id error } } }
  """
  mdmBulkUpdate(
    "Master name (required)"
    master: String!
    "Array of {id, data} objects as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMBulkResponse!

  """
  Bulk patch (partial update) multiple records.
  Data is a JSON string containing an array of {id, data} objects.
  Only the provided fields in each data object are merged.
  
  Example:
    mutation { mdmBulkPatch(master: "product", input: { data: "[{\"id\":\"1\",\"data\":{\"name\":\"Patched\"}}]" }) { master total succeeded failed results { success id error } } }
  """
  mdmBulkPatch(
    "Master name (required)"
    master: String!
    "Array of {id, data} objects as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMBulkResponse!

  """
  Bulk delete multiple records by primary key (soft delete).
  Data is a JSON string containing an array of ID strings.
  
  Example:
    mutation { mdmBulkDelete(master: "product", input: { data: "[\"1\",\"2\",\"3\"]" }) { master total succeeded failed results { success id error } } }
  """
  mdmBulkDelete(
    "Master name (required)"
    master: String!
    "Array of ID strings as JSON string wrapped in input object"
    input: MutationInput!
  ): MDMBulkResponse!
}

"""
Bulk operation result for a single record
"""
type BulkResult {
  "Whether this record operation succeeded"
  success: Boolean!
  "Primary key of the record"
  id: String
  "Error message if this record failed"
  error: String
}

"""
Response type for bulk mutation operations (bulkCreate, bulkUpdate, bulkPatch, bulkDelete).
"""
type MDMBulkResponse {
  "Master name"
  master: String
  "Operation performed: bulkCreate, bulkUpdate, bulkPatch, bulkDelete"
  operation: String
  "Total records submitted"
  total: Int
  "Number of records that succeeded"
  succeeded: Int
  "Number of records that failed"
  failed: Int
  "Per-record results"
  results: [BulkResult!]
  "Error message if the entire operation failed"
  error: String
}

"""
Input type for mutation data — wraps the record data JSON string.
Auto-generated by API Mesh from request-schemas/mutation-req.json.
"""
input MutationInput {
  "Record data as a JSON string e.g. {\"name\":\"value\"}"
  data: String!
}
