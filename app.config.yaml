application:
  actions: actions
  web: web-src
  hooks:
    post-app-deploy: ./hooks/post-app-deploy.js
  runtimeManifest:
    database:
      auto-provision: true
      region: apac
    packages:
      datahub:
        license: Apache-2.0
        inputs:
          LOG_LEVEL: debug
          # Infrastructure (immutable — set once at init)
          DB_REGION: $DB_REGION
          APP_TIMEZONE: $APP_TIMEZONE
          MDM_MAX_STORAGE_MB: $MDM_MAX_STORAGE_MB
          MDM_MAX_DOCUMENTS: $MDM_MAX_DOCUMENTS
          MDM_MAX_DOCUMENT_SIZE_KB: $MDM_MAX_DOCUMENT_SIZE_KB
          # Cache TTLs
          METRICS_CACHE_TTL_MINUTES: $METRICS_CACHE_TTL_MINUTES
          INFRA_METRICS_CACHE_TTL_MINUTES: $INFRA_METRICS_CACHE_TTL_MINUTES
          RESOLVE_CACHE_TTL_SECONDS: $RESOLVE_CACHE_TTL_SECONDS
          SETTINGS_CACHE_TTL_SECONDS: $SETTINGS_CACHE_TTL_SECONDS
          ROLES_SEED_CACHE_TTL_SECONDS: $ROLES_SEED_CACHE_TTL_SECONDS
          METRICS_STALE_TTL_SECONDS: $METRICS_STALE_TTL_SECONDS
          AUDIT_MASTERS_CACHE_TTL_SECONDS: $AUDIT_MASTERS_CACHE_TTL_SECONDS
          # API defaults
          DEFAULT_PAGE_SIZE: $DEFAULT_PAGE_SIZE
          MAX_PAGE_SIZE: $MAX_PAGE_SIZE
          RATE_LIMIT_PER_MINUTE: $RATE_LIMIT_PER_MINUTE
          RATE_LIMIT_WINDOW_SECONDS: $RATE_LIMIT_WINDOW_SECONDS
          API_MESH_CACHE_TTL: $API_MESH_CACHE_TTL
          # Schema
          MAX_SCHEMA_FIELDS: $MAX_SCHEMA_FIELDS
          # Performance
          BULK_BATCH_SIZE: $BULK_BATCH_SIZE
          QUERY_TIMEOUT: $QUERY_TIMEOUT
          DB_TOKEN_EXPIRY_HOURS: $DB_TOKEN_EXPIRY_HOURS
          DB_TOKEN_REFRESH_MARGIN_SECONDS: $DB_TOKEN_REFRESH_MARGIN_SECONDS
          MAX_VERSIONS_PER_RECORD: $MAX_VERSIONS_PER_RECORD
          # Audit
          AUDIT_RETENTION_DAYS: $AUDIT_RETENTION_DAYS
          ARCHIVE_RETENTION_DAYS: $ARCHIVE_RETENTION_DAYS
          # Partners
          PARTNER_KEY_EXPIRY_DAYS: $PARTNER_KEY_EXPIRY_DAYS
          # User Management
          INITIAL_ADMIN_EMAIL: $INITIAL_ADMIN_EMAIL
        actions:
          generic:
            function: actions/generic/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          publish-events:
            function: actions/publish-events/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              apiKey: $SERVICE_API_KEY
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          dashboard:
            function: actions/dashboard/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          file-upload:
            function: actions/file-upload/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          file-list:
            function: actions/file-list/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          file-detail:
            function: actions/file-detail/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          file-delete:
            function: actions/file-delete/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          metadata-update:
            function: actions/metadata-update/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          query-data:
            function: actions/query-data/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: true
              final: true
              include-ims-credentials: true
          mdm-data:
            function: actions/mdm-data/index.js
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              include-ims-credentials: true
          mdm-facets:
